name: Commute Traffic Collector

on:
  schedule:
    # Every 15 min during the morning-commute window: 21:00-03:59 UTC = 05:00-11:59 MYT.
    # (Widened from 05:00-09:59; the last tick 11:45 MYT + the 30-min collection
    # lead covers leave-home times up to ~12:15, so late departures still record.)
    # Runs every calendar day; collect_traffic.py skips weekends, Malaysia public
    # holidays, and any request whose leave-home time is not near "now".
    - cron: '*/15 21-23,0-3 * * *'
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_scripts/requirements.txt

      - name: Run traffic collection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          python python_scripts/collect_traffic.py
