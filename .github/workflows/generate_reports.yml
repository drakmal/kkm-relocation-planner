name: Generate Due Reports

on:
  schedule:
    # Hourly — picks up any request whose tracking window has just ended and
    # emails its report. Groq generates in seconds, so no fixed delay is needed.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  generate-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_scripts/requirements.txt

      - name: Generate and email due reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          python python_scripts/run_due_reports.py
